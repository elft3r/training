name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start GitHub Deployment
        id: gh-deployment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const environment = `preview-pr-${process.env.PR_NUMBER}`;
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.PR_HEAD_SHA,
              environment,
              description: `Preview deployment for PR #${process.env.PR_NUMBER}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              environment,
              log_url: logUrl,
            });

            core.setOutput('deployment_id', deployment.id);
            core.setOutput('environment', environment);

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Create Cloudflare Pages project if needed
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ github.event.repository.name }} --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ github.event.repository.name }} --branch=pr-${{ github.event.pull_request.number }}

      - name: Finalize GitHub Deployment
        if: always() && steps.gh-deployment.outputs.deployment_id
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_ID: ${{ steps.gh-deployment.outputs.deployment_id }}
          DEPLOYMENT_ENVIRONMENT: ${{ steps.gh-deployment.outputs.environment }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        with:
          script: |
            const state = process.env.DEPLOY_OUTCOME === 'success' ? 'success' : 'failure';
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state,
              environment: process.env.DEPLOYMENT_ENVIRONMENT,
              log_url: logUrl,
            };

            if (state === 'success' && process.env.DEPLOYMENT_URL) {
              params.environment_url = process.env.DEPLOYMENT_URL;
            }

            await github.rest.repos.createDeploymentStatus(params);

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const body = `### Preview Deployment\n\nThis PR has been deployed for preview:\n\n` +
              `${process.env.DEPLOYMENT_URL}\n`;

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments
        uses: actions/github-script@v7
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          BRANCH_ALIAS: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const baseUrl = `https://api.cloudflare.com/client/v4/accounts/${process.env.CLOUDFLARE_ACCOUNT_ID}/pages/projects/${process.env.PROJECT_NAME}/deployments`;
            const headers = {
              'Authorization': `Bearer ${process.env.CLOUDFLARE_API_TOKEN}`,
              'Content-Type': 'application/json',
            };

            const deployments = [];
            let page = 1;

            while (true) {
              const url = `${baseUrl}?page=${page}`;
              const res = await fetch(url, { headers });
              if (!res.ok) {
                core.warning(`Failed to list deployments on page ${page}: ${res.status}`);
                break;
              }

              const data = await res.json();
              const pageDeployments = Array.isArray(data.result) ? data.result : [];
              deployments.push(...pageDeployments);

              const info = data.result_info;
              if (!info || typeof info.total_pages !== 'number' || page >= info.total_pages) {
                break;
              }

              page += 1;
            }

            const prDeployments = deployments.filter(
              d => d.deployment_trigger?.metadata?.branch === process.env.BRANCH_ALIAS
            );

            core.info(`Found ${prDeployments.length} deployment(s) for ${process.env.BRANCH_ALIAS}`);

            for (const d of prDeployments) {
              const delRes = await fetch(`${baseUrl}/${d.id}?force=true`, {
                method: 'DELETE',
                headers,
              });
              if (delRes.ok) {
                core.info(`Deleted deployment ${d.id}`);
              } else {
                core.warning(`Failed to delete deployment ${d.id}: ${delRes.status}`);
              }
            }

      - name: Deactivate GitHub Deployments
        uses: actions/github-script@v7
        env:
          ENVIRONMENT: preview-pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const environment = process.env.ENVIRONMENT;

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment,
                per_page: 100,
              }
            );

            core.info(`Found ${deployments.length} GitHub deployment(s) for ${environment}`);

            for (const d of deployments) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: d.id,
                  state: 'inactive',
                  environment,
                });
                core.info(`Marked deployment ${d.id} as inactive`);
              } catch (err) {
                core.warning(`Failed to deactivate deployment ${d.id}: ${err.message}`);
              }
            }
