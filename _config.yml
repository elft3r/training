theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

title: Container, Cloud & DevOps Tutorials
description: Docker, Kubernetes, Cloud, and DevOps hands-on labs and tutorials
url: "https://training.new-bridge.dev"
baseurl: ""

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-include-cache

# Convert .md links to .html in the generated site
relative_links:
  enabled: true
  collections: false

# Search
search: true

# Footer
footer:
  links:
    - label: "Licensed under Apache 2.0"
      url: "https://github.com/elft3r/training/blob/main/LICENSE"

# Default layout & sidebar nav
defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false
      toc: true
      toc_sticky: true
      sidebar:
        nav: "main"

exclude:
  - Kubernetes/website/
  - istio-workshop/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
  - LICENSE
  - CLAUDE.md
  - Docker/kickstart/flask-app/
  - Docker/kickstart/static-site/
  - Presentations/
